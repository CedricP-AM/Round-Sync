name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Read Go version from project
      run: echo "GO_VERSION=$(grep -E "^de\.felixnuesse\.extract\.goVersion=" gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Set up Go from gradle.properties
      uses: actions/setup-go@v4
      with:
        go-version: '${{env.GO_VERSION}}'
      id: go
    
    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v3
    
    - name: Install NDK from gradle.properties
      run: |
        NDK_VERSION="$(grep -E "^de\.felixnuesse\.extract\.ndkVersion=" gradle.properties | cut -d'=' -f2)"
        sdkmanager "ndk;${NDK_VERSION}"
    
    - name: Build Release APKs
      run: ./gradlew assembleOssRelease
    
    - name: Upload Release APK (arm)
      uses: actions/upload-artifact@v4
      with:
        name: release-armeabi.apk
        path: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-oss-armeabi-v7a-release.apk
    
    - name: Upload Release APK (arm64)
      uses: actions/upload-artifact@v4
      with:
        name: release-arm64.apk
        path: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-oss-arm64-v8a-release.apk
    
    - name: Upload Release APK (x86)
      uses: actions/upload-artifact@v4
      with:
        name: release-x86.apk
        path: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-oss-x86-release.apk
    
    - name: Upload Release APK (x86_64)
      uses: actions/upload-artifact@v4
      with:
        name: release-x86_64.apk
        path: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-oss-x86_64-release.apk
    
    - name: Upload Release APK (universal)
      uses: actions/upload-artifact@v4
      with:
        name: release-universal.apk
        path: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-oss-universal-release.apk
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ github.workspace }}/app/build/outputs/apk/oss/release/*-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
